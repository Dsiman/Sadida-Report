<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Submissions — Sadida Report Admin</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <header class="admin-header">
        <div>
            <h1>Submissions</h1>
            <p id="admin-user" class="helptext"></p>
        </div>
        <button type="button" id="logout-btn" class="ghost">Log out</button>
    </header>
    <main class="container admin-container">
        <div id="admin-notice" data-error-host></div>

        <section class="filters">
            <label>
                <span>Type</span>
                <select id="filter-type">
                    <option value="">All</option>
                    <option value="bug">Bug</option>
                    <option value="issue">Issue</option>
                    <option value="suggestion">Suggestion</option>
                </select>
            </label>
            <label>
                <span>Status</span>
                <select id="filter-status">
                    <option value="">All</option>
                    <option value="new">New</option>
                    <option value="triaged">Triaged</option>
                    <option value="in-progress">In progress</option>
                    <option value="resolved">Resolved</option>
                    <option value="wontfix">Won't fix</option>
                </select>
            </label>
            <label>
                <span>Search</span>
                <input type="search" id="filter-search" placeholder="Summary, name, description…" />
            </label>
            <button type="button" id="refresh-btn" class="primary">Refresh</button>
        </section>

        <p id="result-count" class="helptext"></p>

        <div id="submissions-table-host">
            <p class="helptext">Loading…</p>
        </div>

        <nav class="pagination">
            <button type="button" id="prev-btn" disabled>← Prev</button>
            <span id="page-label"></span>
            <button type="button" id="next-btn" disabled>Next →</button>
        </nav>
    </main>

    <dialog id="detail-dialog">
        <article>
            <header class="detail-header">
                <h2 id="detail-title">Submission</h2>
                <button type="button" id="detail-close" class="ghost" aria-label="Close">✕</button>
            </header>
            <dl id="detail-meta"></dl>
            <h3>Admin notes</h3>
            <textarea id="detail-notes" rows="4" placeholder="Internal notes (not shown to the submitter)"></textarea>
            <h3>Tags</h3>
            <input type="text" id="detail-tags" placeholder="comma,separated,tags" />
            <h3>Status</h3>
            <select id="detail-status">
                <option value="new">New</option>
                <option value="triaged">Triaged</option>
                <option value="in-progress">In progress</option>
                <option value="resolved">Resolved</option>
                <option value="wontfix">Won't fix</option>
            </select>
            <h3>Payload</h3>
            <pre id="detail-payload"></pre>
            <footer class="detail-footer">
                <button type="button" id="detail-delete" class="danger">Delete</button>
                <button type="button" id="detail-save" class="primary">Save changes</button>
            </footer>
        </article>
    </dialog>

    <script type="module" src="js/admin.js"></script>
</body>
</html>
