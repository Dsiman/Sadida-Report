<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Admin — Sadida Report</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <header>
        <h1>Admin Access</h1>
        <p>Sign in to manage submissions. If no admin exists yet, the first account you create here becomes the admin — there's no self-service after that.</p>
    </header>
    <main class="container">
        <div class="tabs" role="tablist">
            <button type="button" id="tab-login" class="tab-btn active" role="tab" aria-selected="true">Log in</button>
            <button type="button" id="tab-register" class="tab-btn" role="tab" aria-selected="false">Create first admin</button>
        </div>

        <form id="login-form" class="auth-form">
            <div data-error-host></div>
            <label>
                <span class="required">Email</span>
                <input type="email" name="email" required autocomplete="email" maxlength="200" />
            </label>
            <label>
                <span class="required">Password</span>
                <input type="password" name="password" required autocomplete="current-password" minlength="12" maxlength="200" />
            </label>
            <button type="submit" class="primary">Log in</button>
        </form>

        <form id="register-form" class="auth-form" hidden>
            <div data-error-host></div>
            <p class="helptext">You only get to run this once. The password can't be reset through the UI — write it down somewhere.</p>
            <label>
                <span class="required">Email</span>
                <input type="email" name="email" required autocomplete="email" maxlength="200" />
            </label>
            <label>
                <span class="required">Password (12+ chars)</span>
                <input type="password" name="password" required autocomplete="new-password" minlength="12" maxlength="200" />
            </label>
            <label>
                <span class="required">Confirm password</span>
                <input type="password" name="confirmPassword" required autocomplete="new-password" minlength="12" maxlength="200" />
            </label>
            <button type="submit" class="primary">Create admin account</button>
        </form>

        <p class="helptext" style="margin-top:2rem">
            <a href="index.html">← Back to the public portal</a>
        </p>
    </main>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
